<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<title>パスワード初期設定（管理者用）</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 420px; margin: 60px auto; padding: 0 20px; }
  h1 { font-size: 18px; }
  input { width: 100%; padding: 10px; font-size: 15px; box-sizing: border-box; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; }
  button { width: 100%; padding: 12px; background: #0071e3; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
  #result { margin-top: 14px; font-size: 13px; }
  .ok  { color: #1b8a5a; }
  .err { color: #c0392b; }
</style>
</head>
<body>
  <h1>🔑 案件管理ツール パスワード初期設定</h1>
  <p style="font-size:13px;color:#666;">このページは管理者が一度だけ使用します。設定後はこのファイルをサーバーから削除して構いません。</p>
  <input type="password" id="newPassword" placeholder="新しいパスワードを入力" />
  <button onclick="setPassword()">この内容でFirebaseに保存</button>
  <div id="result"></div>

  <script src="firebase-config.js"></script>
  <script>
    async function setPassword() {
      const pw = document.getElementById("newPassword").value;
      const resultEl = document.getElementById("result");
      if (!pw) { resultEl.innerHTML = '<span class="err">パスワードを入力してください</span>'; return; }
      try {
        await db.collection("config").doc("appPassword").set({ password: pw, updatedAt: new Date().toISOString() });
        resultEl.innerHTML = '<span class="ok">✅ パスワードを保存しました。このページは削除してOKです。</span>';
      } catch (err) {
        console.error(err);
        resultEl.innerHTML = '<span class="err">❌ 保存に失敗しました: ' + err.message + '</span>';
      }
    }
  </script>
</body>
</html>
