<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSダッシュボード</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="auth.css"/>
  <link rel="stylesheet" href="cs.css"/>
  <link rel="stylesheet" href="cs-dashboard.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
<header class="cs-app-header">
  <div class="header-inner">
    <div class="header-title">
      <img src="logo2.png" alt="Parasight" class="header-logo"/>
      <span class="cs-branch-tag">CS DASHBOARD</span>
      <strong id="dashboardHospitalName" class="dashboard-hospital-name">読み込み中...</strong>
    </div>
    <div class="cs-header-actions">
      <a href="cs.html" class="btn-cs-list">カード</a>
      <a href="cs-list.html" class="btn-cs-list">一覧</a>
      <a href="index.html" class="btn-back-project">案件管理</a>
    </div>
  </div>
</header>

<main id="csDashboardRoot" class="dashboard-page">
  <div class="dashboard-summary" id="dashboardSummary"></div>
  <section class="dashboard-phase-panel" id="dashboardPhasePanel"></section>
  <section class="dashboard-category-grid" id="dashboardCategoryGrid"></section>
</main>

<div id="dashboardEditModal" class="modal-overlay dashboard-edit-modal">
  <div class="modal-box dashboard-modal-box">
    <div class="cs-modal-header">
      <h2 id="dashboardModalTitle">Input</h2>
      <button type="button" class="btn-modal-close" onclick="closeDashboardModal()" style="color:white;">✕</button>
    </div>
    <form id="dashboardEditForm">
      <div class="modal-body" id="dashboardModalBody"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeDashboardModal()">キャンセル</button>
        <button type="submit" class="btn btn-primary">保存</button>
      </div>
    </form>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
<script src="cs.js"></script>
<script src="cs-dashboard.js"></script>
</body>
</html>
